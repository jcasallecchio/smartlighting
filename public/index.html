<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1F0426" />
    <title>Smart Lighting</title>
    <link rel="stylesheet" href="css/styles.css?v=17" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Smart Lighting</p>
          <h1>Controle de ilumina&ccedil;&atilde;o</h1>
        </div>
      </header>

      <nav class="main-actions" aria-label="Controles principais">
        <button class="main-button power-button" id="powerButton" type="button" disabled>
          <span class="button-icon" aria-hidden="true">&#9211;</span>
          <span class="button-copy">
            <strong id="powerButtonLabel">Ligar</strong>
            <small id="powerButtonHint">Verificando dispositivo</small>
          </span>
        </button>

        <button class="main-button" id="colorsButton" type="button" aria-controls="colorsPanel" aria-expanded="false">
          <span class="button-icon palette-icon" aria-hidden="true"></span>
          <span class="button-copy">
            <strong>Cores</strong>
            <small>Alterar a cor da luminaria</small>
          </span>
          <span class="button-chevron" aria-hidden="true">+</span>
        </button>

        <section class="expand-panel colors-panel" id="colorsPanel" hidden>
          <div class="color-blocks">
            <article class="color-card" id="currentColorCard">
              <div class="card-title">
                <h3>Atual</h3>
                <span id="currentColorName">Colorido</span>
              </div>
              <div class="color-grid" id="currentColorGrid" aria-label="Cor atual"></div>
            </article>

            <article class="color-card">
              <div class="card-title">
                <h3>Destino</h3>
                <span id="targetColorName">Colorido</span>
              </div>
              <div class="color-grid" id="targetColorGrid" aria-label="Selecionar cor de destino"></div>
            </article>
          </div>

          <button class="confirm-button" id="confirmColorsButton" type="button">Confirmar</button>
        </section>

        <button class="main-button" id="timerButton" type="button" aria-controls="timerPanel" aria-expanded="false">
          <span class="button-icon" aria-hidden="true">&#9201;</span>
          <span class="button-copy">
            <strong>Timer</strong>
            <small>Programar hor&aacute;rios</small>
          </span>
          <span class="button-chevron" aria-hidden="true">+</span>
        </button>

        <section class="expand-panel timer-panel" id="timerPanel" hidden>
          <div class="timer-options">
            <article class="timer-card">
              <label class="timer-toggle" for="turnOnTimerEnabled">
                <input id="turnOnTimerEnabled" type="checkbox" />
                <span class="custom-checkbox" aria-hidden="true"></span>
                <strong>Ligar</strong>
              </label>
              <div class="timer-fields">
                <label>
                  <span>Hor&aacute;rio</span>
                  <input id="turnOnTime" type="time" disabled />
                </label>
                <label>
                  <span>Cor</span>
                  <select id="turnOnColor" disabled></select>
                </label>
              </div>
            </article>

            <article class="timer-card">
              <label class="timer-toggle" for="turnOffTimerEnabled">
                <input id="turnOffTimerEnabled" type="checkbox" />
                <span class="custom-checkbox" aria-hidden="true"></span>
                <strong>Desligar</strong>
              </label>
              <div class="timer-fields single-field">
                <label>
                  <span>Hor&aacute;rio</span>
                  <input id="turnOffTime" type="time" disabled />
                </label>
              </div>
            </article>
          </div>

          <button class="confirm-button" id="confirmTimerButton" type="button">Confirmar</button>
        </section>
      </nav>

      <footer class="app-footer">
        <span id="lastSync">Aguardando sincroniza&ccedil;&atilde;o</span>
        <span class="footer-copyright">&copy; JCasallecchio 2026</span>
        <a href="logs.html">Terminal</a>
      </footer>
    </main>

    <div class="toast-region" aria-live="polite" aria-atomic="true">
      <div class="toast" id="toast" role="status" hidden>
        <span class="toast-icon" id="toastIcon" aria-hidden="true"></span>
        <span class="toast-message" id="toastMessage"></span>
        <span class="toast-progress" aria-hidden="true"></span>
      </div>
    </div>

    <script src="js/app.js?v=14" defer></script>
  </body>
</html>
