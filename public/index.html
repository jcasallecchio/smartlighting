<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lighting Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-indicator {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            transition: all 0.3s ease;
        }
        
        .status-indicator.on {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .status-indicator.off {
            background: #ddd;
            color: #999;
        }
        
        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
        
        .color-display {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-on {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            grid-column: 1;
        }
        
        .btn-on:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-off {
            background: #ff6b6b;
            grid-column: 2;
        }
        
        .btn-off:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .color-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .color-btn {
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .color-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .color-btn.active {
            border-color: #333;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #333;
        }
        
        .timers-section {
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .timer-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        
        .timer-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .timer-info {
            flex: 1;
        }
        
        .timer-time {
            font-weight: 600;
            color: #333;
        }
        
        .timer-type {
            font-size: 12px;
            color: #666;
        }
        
        .timer-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        
        .timer-delete:hover {
            background: #ff5252;
        }
        
        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffe5e5;
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .success {
            background: #e5ffe5;
            color: #51cf66;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💡 Smart Lighting</h1>
            <p>Controle inteligente de iluminação</p>
        </div>
        
        <div id="message"></div>
        
        <div class="status-card">
            <div class="status-indicator" id="statusIndicator">
                💤
            </div>
            <div class="status-text" id="statusText">Desligado</div>
            <div class="color-display">
                Cor atual: <strong id="currentColor">-</strong>
            </div>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
        </div>
        
        <div class="controls">
            <button class="btn btn-on" onclick="turnOn()">Ligar</button>
            <button class="btn btn-off" onclick="turnOff()">Desligar</button>
        </div>
        
        <div class="color-selector" id="colorSelector"></div>
        
        <div class="timers-section">
            <div class="section-title">⏰ Agendamentos</div>
            <div class="timer-list" id="timerList"></div>
        </div>
    </div>
    
    <script>
        // Configuration
        const API_BASE = '/api';
        const REFRESH_INTERVAL = 2000; // 2 seconds
        let refreshTimer = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadColors();
            loadState();
            loadTimers();
            startRefresh();
        });
        
        function startRefresh() {
            refreshTimer = setInterval(() => {
                loadState();
                loadTimers();
            }, REFRESH_INTERVAL);
        }
        
        function stopRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
            }
        }
        
        // API Functions
        async function apiCall(endpoint, method = 'GET', data = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                const result = await response.json();
                
                if (!response.ok && !result.success) {
                    throw new Error(result.message || 'API Error');
                }
                
                return result;
            } catch (error) {
                showMessage(error.message, 'error');
                throw error;
            }
        }
        
        // State Management
        async function loadState() {
            try {
                const result = await apiCall('/state');
                const data = result.data;
                
                // Update status indicator
                const indicator = document.getElementById('statusIndicator');
                const statusText = document.getElementById('statusText');
                const currentColor = document.getElementById('currentColor');
                const progressBar = document.getElementById('progressBar');
                const progressText = document.getElementById('progressText');
                
                if (data.state === 'on') {
                    indicator.className = 'status-indicator on';
                    indicator.textContent = '💡';
                    statusText.textContent = 'Ligado';
                } else {
                    indicator.className = 'status-indicator off';
                    indicator.textContent = '💤';
                    statusText.textContent = 'Desligado';
                }
                
                currentColor.textContent = data.current_color;
                
                // Handle transition progress
                if (data.is_executing && data.execution_progress) {
                    progressBar.style.display = 'block';
                    const progress = data.execution_progress;
                    const percentage = progress.total_steps > 0 
                        ? (progress.current_step / progress.total_steps) * 100 
                        : 0;
                    document.getElementById('progressFill').style.width = percentage + '%';
                    
                    const remaining = progress.total_steps - progress.current_step;
                    progressText.textContent = `Transição: ${progress.current_step}/${progress.total_steps} passos`;
                } else {
                    progressBar.style.display = 'none';
                    progressText.textContent = '';
                }
                
            } catch (error) {
                console.error('Failed to load state:', error);
            }
        }
        
        // Color Functions
        async function loadColors() {
            try {
                const result = await apiCall('/colors');
                const selector = document.getElementById('colorSelector');
                selector.innerHTML = '';
                
                result.data.colors.forEach(color => {
                    const btn = document.createElement('button');
                    btn.className = 'color-btn';
                    btn.style.background = color.hex;
                    btn.textContent = color.name;
                    btn.onclick = () => selectColor(color.name);
                    selector.appendChild(btn);
                });
            } catch (error) {
                console.error('Failed to load colors:', error);
            }
        }
        
        async function selectColor(color) {
            try {
                // Update UI
                document.querySelectorAll('.color-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                
                // Turn on with color
                await turnOn(color);
            } catch (error) {
                console.error('Failed to select color:', error);
            }
        }
        
        // Control Functions
        async function turnOn(color = 'colorido') {
            try {
                const result = await apiCall('/on', 'POST', { color });
                showMessage('Iluminação ligada', 'success');
                loadState();
            } catch (error) {
                console.error('Failed to turn on:', error);
            }
        }
        
        async function turnOff() {
            try {
                const result = await apiCall('/off', 'POST', {});
                showMessage('Iluminação desligada', 'success');
                loadState();
            } catch (error) {
                console.error('Failed to turn off:', error);
            }
        }
        
        // Timer Functions
        async function loadTimers() {
            try {
                const result = await apiCall('/timers');
                const timerList = document.getElementById('timerList');
                
                if (result.data.timers.length === 0) {
                    timerList.innerHTML = '<p style="text-align: center; color: #999; font-size: 14px;">Nenhum agendamento</p>';
                    return;
                }
                
                timerList.innerHTML = '';
                result.data.timers.forEach(timer => {
                    const item = document.createElement('div');
                    item.className = 'timer-item';
                    item.innerHTML = `
                        <div class="timer-info">
                            <div class="timer-time">${timer.time}</div>
                            <div class="timer-type">${timer.type === 'on' ? 'Ligar' : 'Desligar'} ${timer.target_color ? '(' + timer.target_color + ')' : ''}</div>
                        </div>
                        <button class="timer-delete" onclick="deleteTimer('${timer.id}')">Deletar</button>
                    `;
                    timerList.appendChild(item);
                });
            } catch (error) {
                console.error('Failed to load timers:', error);
            }
        }
        
        async function deleteTimer(id) {
            if (confirm('Tem certeza que deseja deletar este agendamento?')) {
                try {
                    await apiCall('/timers_delete', 'POST', { id });
                    showMessage('Agendamento deletado', 'success');
                    loadTimers();
                } catch (error) {
                    console.error('Failed to delete timer:', error);
                }
            }
        }
        
        // Messaging
        function showMessage(message, type = 'info') {
            const container = document.getElementById('message');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            container.innerHTML = `<div class="${className}">${message}</div>`;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }
    </script>
</body>
</html>
