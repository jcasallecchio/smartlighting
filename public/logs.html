<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Lighting | Terminal de Logs</title>
    <link rel="stylesheet" href="css/logs.css?v=2">
</head>
<body>
    <main class="log-shell">
        <header class="terminal-header">
            <div class="terminal-dots" aria-hidden="true">
                <span class="dot dot-red"></span>
                <span class="dot dot-yellow"></span>
                <span class="dot dot-green"></span>
            </div>
            <div>
                <p class="terminal-path">smartlighting://activity/logs</p>
                <h1>Terminal de atividades</h1>
            </div>
            <div class="header-actions">
                <button
                    class="filter-toggle"
                    id="filterToggleButton"
                    type="button"
                    aria-controls="logToolbar"
                    aria-expanded="true"
                >Ocultar busca</button>
                <div class="connection-state" id="connectionState" role="status">
                    <span class="pulse"></span>
                    <span id="connectionLabel">Conectando</span>
                </div>
            </div>
        </header>

        <section class="toolbar" id="logToolbar" aria-label="Filtros dos logs">
            <label>
                <span>Busca</span>
                <input id="searchFilter" type="search" placeholder="Mensagem ou contexto">
            </label>
            <label>
                <span>N&iacute;vel</span>
                <select id="levelFilter">
                    <option value="">Todos</option>
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO">INFO</option>
                    <option value="SUCCESS">SUCCESS</option>
                    <option value="WARNING">WARNING</option>
                    <option value="ERROR">ERROR</option>
                    <option value="CRITICAL">CRITICAL</option>
                </select>
            </label>
            <label>
                <span>Categoria</span>
                <select id="categoryFilter">
                    <option value="">Todas</option>
                </select>
            </label>
            <label>
                <span>Data</span>
                <input id="dateFilter" type="date">
            </label>
            <label>
                <span>Limite</span>
                <select id="limitFilter">
                    <option value="100">100</option>
                    <option value="250" selected>250</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                </select>
            </label>
            <div class="toolbar-actions">
                <button id="refreshButton" type="button">Atualizar</button>
                <button id="pauseButton" type="button">Pausar</button>
                <button id="exportButton" type="button">Exportar JSON</button>
            </div>
        </section>

        <section class="stats" aria-label="Resumo dos logs">
            <div><span id="totalCount">0</span><small>eventos</small></div>
            <div><span id="errorCount">0</span><small>erros</small></div>
            <div><span id="warningCount">0</span><small>alertas</small></div>
            <div><span id="successCount">0</span><small>sucessos</small></div>
            <p id="lastUpdated">Aguardando primeira leitura...</p>
        </section>

        <section class="terminal" aria-label="Sa&iacute;da dos logs">
            <div class="terminal-command">
                <span class="prompt">smartlighting@server:~$</span>
                <span>tail --follow data/logs/app.log</span>
            </div>
            <div id="logOutput" class="log-output" aria-live="polite"></div>
        </section>

        <footer>
            <a href="index.html">Voltar ao controle</a>
            <span>Atualiza&ccedil;&atilde;o autom&aacute;tica a cada 3 segundos</span>
        </footer>
    </main>

    <script src="js/logs.js?v=2" defer></script>
</body>
</html>
